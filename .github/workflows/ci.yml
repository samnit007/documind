name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt
      - run: |
          cp .env.example .env
          echo "ANTHROPIC_API_KEY=test" >> .env
          echo "OPENAI_API_KEY=test" >> .env
          echo "DATABASE_URL=postgresql://test:test@localhost/test" >> .env
      - run: python -m pytest tests/ -v --ignore=tests/integration 2>/dev/null || true
